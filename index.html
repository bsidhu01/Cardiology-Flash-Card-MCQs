<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiology Flashcards — Clinical Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f2ee;
    --surface: #ffffff;
    --surface2: #f9f8f6;
    --border: #ddd8d0;
    --border-strong: #b8b0a5;
    --text: #1a1714;
    --text-secondary: #5a524a;
    --text-muted: #9a9088;
    --accent: #b5212e;
    --accent-blue: #1a4f7a;
    --accent-light: #f0ece5;
    --correct: #1a6641;
    --correct-bg: #edf7f1;
    --correct-border: #a8d5b8;
    --wrong: #962020;
    --wrong-bg: #fdf1f1;
    --wrong-border: #f0b8b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  .site-header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem 1.5rem;
  }

  .institution-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }

  .header-rule {
    width: 36px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 0.8rem;
  }

  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.15;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  /* ── MAIN WRAPPER ── */
  .wrapper {
    width: 100%;
    max-width: 780px;
    padding: 1.5rem 1.5rem 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── FILTER ROW ── */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 1.2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
  }

  .filter-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── PROGRESS ── */
  .progress-bar-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    white-space: nowrap;
  }

  /* ── CARD PANEL ── */
  .card-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2rem;
    display: none;
    flex-direction: column;
    min-height: 380px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    margin-bottom: 1rem;
  }

  .card-panel.active { display: flex; }

  /* ── CATEGORY TAG ── */
  .category-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 2px;
    margin-bottom: 1rem;
    width: fit-content;
    font-weight: 500;
  }

  .cat-arrhythmia { background: #fdf0f0; color: #9b1c1c; border: 1px solid #f0c0c0; }
  .cat-hf         { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
  .cat-cad        { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
  .cat-endo       { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
  .cat-aorta      { background: #faf5ff; color: #581c87; border: 1px solid #e9d5ff; }
  .cat-htn        { background: #fefce8; color: #713f12; border: 1px solid #fef08a; }
  .cat-valve      { background: #fff1f2; color: #881337; border: 1px solid #fecdd3; }

  .card-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }

  .question-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.96rem;
    line-height: 1.72;
    color: var(--text);
    margin-bottom: 1.6rem;
  }

  /* ── OPTIONS ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    margin-top: auto;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--surface2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.84rem;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text);
    text-align: left;
    width: 100%;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent-blue);
    background: #eff5fb;
    color: var(--accent-blue);
  }

  .option.correct {
    border-color: var(--correct-border);
    background: var(--correct-bg);
    color: var(--correct);
  }

  .option.wrong {
    border-color: var(--wrong-border);
    background: var(--wrong-bg);
    color: var(--wrong);
  }

  .option.disabled { cursor: default; }

  .option-letter {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    min-width: 18px;
    padding-top: 2px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .option.correct .option-letter { color: var(--correct); }
  .option.wrong .option-letter   { color: var(--wrong); }

  .flip-hint {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 1.2rem;
    padding-top: 0.9rem;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  /* ── ANSWER PANEL ── */
  .answer-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--correct);
    margin-bottom: 0.35rem;
    font-weight: 500;
  }

  .correct-answer-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--correct);
    margin-bottom: 1.1rem;
    line-height: 1.4;
  }

  .explanation {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.87rem;
    line-height: 1.78;
    color: var(--text-secondary);
    padding: 0.9rem 1.1rem;
    background: var(--surface2);
    border-left: 3px solid var(--accent-blue);
    border-radius: 0 2px 2px 0;
    margin-bottom: 1.2rem;
  }

  .key-points {
    display: flex;
    flex-direction: column;
    margin-top: auto;
  }

  .key-point {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text-secondary);
    padding: 0.5rem 0;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
    line-height: 1.5;
  }

  .key-point::before {
    content: '→';
    color: var(--accent);
    flex-shrink: 0;
    font-size: 0.7rem;
    margin-top: 1px;
  }

  /* ── NAVIGATION ── */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.55rem 1.2rem;
    border-radius: 2px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: #eff5fb;
  }

  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-btn.primary {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
    flex: 1;
    text-align: center;
  }

  .nav-btn.primary:hover:not(:disabled) {
    background: #163d60;
    border-color: #163d60;
    color: #fff;
  }

  /* ── COMPLETED ── */
  .completed {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    text-align: center;
    padding: 3rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .completed.visible { display: flex; }

  .completed-rule { width: 36px; height: 2px; background: var(--accent); }

  .completed-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .final-score-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .final-score-num {
    font-family: 'Libre Baskerville', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  /* ── FOOTER ── */
  footer {
    width: 100%;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
    padding: 1.1rem 1.5rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }

  #mainArea { width: 100%; display: flex; flex-direction: column; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="institution-line">Cardiology Residency Programme</div>
    <div class="header-rule"></div>
    <h1>Clinical Cardiology Flashcards</h1>
    <div class="subtitle">Diagnosis &nbsp;·&nbsp; Investigation &nbsp;·&nbsp; Management &nbsp;·&nbsp; 50 Cards</div>
  </div>
</header>

<div class="wrapper">
  <div class="filter-row" id="filterRow"></div>

  <div id="mainArea">
    <div class="progress-bar-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:2%"></div></div>
      <div class="progress-label" id="progressText">1 / 50</div>
      <div class="score-label" id="scoreBadge">Score: 0</div>
    </div>

    <div class="card-panel active" id="cardFront"></div>
    <div class="card-panel" id="cardBack"></div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Previous</button>
      <button class="nav-btn primary" id="flipBtn" onclick="flipCard()">View Explanation</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <div class="completed" id="completedScreen">
    <div class="completed-rule"></div>
    <div class="completed-title">Deck Complete</div>
    <div class="final-score-label">Your Score</div>
    <div class="final-score-num" id="finalScoreNum"></div>
    <button class="nav-btn primary" style="max-width:200px;width:100%;flex:none" onclick="restart()">Restart Deck</button>
  </div>
</div>

<footer>Created by Dr Bharat Sidhu</footer>

<script>
const cards = [
  {
    cat: "arrhythmia", catLabel: "Arrhythmia",
    q: "A 68-year-old man presents with palpitations and an irregularly irregular pulse. His ECG shows absent P waves and a ventricular rate of 110 bpm. Which pharmacological agent is most appropriate for rate control if he has no structural heart disease?",
    opts: ["Amiodarone", "Digoxin", "Diltiazem", "Flecainide"],
    ans: 2,
    explanation: "Diltiazem (a non-dihydropyridine calcium channel blocker) is appropriate first-line rate control in AF without structural heart disease. Digoxin is less effective during exercise. Flecainide is for rhythm control, not rate control. Amiodarone is reserved for refractory cases.",
    points: ["Rate control target: resting HR <110 bpm (RACE II trial)", "Avoid CCBs in systolic HF; use beta-blocker or digoxin instead", "CHADS₂-VASc guides anticoagulation decision"]
  },
  {
    cat: "arrhythmia", catLabel: "Arrhythmia",
    q: "A 24-year-old athlete collapses during training. ECG shows a short PR interval (0.10s) with a slurred upstroke on the QRS and a delta wave. Which condition does this describe?",
    opts: ["Brugada syndrome", "Long QT syndrome", "Wolff-Parkinson-White syndrome", "AVNRT"],
    ans: 2,
    explanation: "WPW is characterised by a short PR interval, delta wave (slurred QRS upstroke), and widened QRS due to ventricular pre-excitation via an accessory pathway (Bundle of Kent). It can cause life-threatening tachyarrhythmias.",
    points: ["Avoid AV nodal blockers (adenosine, verapamil) in WPW with AF — may cause VF", "Definitive treatment: radiofrequency catheter ablation", "Risk stratify with electrophysiology study in symptomatic patients"]
  },
  {
    cat: "arrhythmia", catLabel: "Arrhythmia",
    q: "A patient has recurrent episodes of SVT terminated by adenosine. Electrophysiology study reveals dual AV nodal pathways. What is the most likely diagnosis?",
    opts: ["Atrial flutter", "AVNRT", "Atrial tachycardia", "Junctional ectopic tachycardia"],
    ans: 1,
    explanation: "AVNRT (atrioventricular nodal re-entrant tachycardia) is the most common regular SVT. It involves dual AV nodal pathways — a fast pathway and a slow pathway — forming a re-entrant circuit. ECG typically shows narrow QRS with retrograde P waves buried in or just after the QRS complex.",
    points: ["Acute: vagal manoeuvres → adenosine → verapamil", "Long-term: slow pathway ablation has >95% cure rate", "Distinguish from AVRT (accessory pathway): subtle ECG differences"]
  },
  {
    cat: "arrhythmia", catLabel: "Arrhythmia",
    q: "A 55-year-old woman is found unresponsive. ECG monitor shows a rapid, irregular, polymorphic ventricular tachycardia. Her QTc is 560ms on baseline ECG. What is the most likely rhythm?",
    opts: ["Ventricular fibrillation", "Torsades de pointes", "Accelerated idioventricular rhythm", "Monomorphic VT"],
    ans: 1,
    explanation: "Torsades de pointes (TdP) is a form of polymorphic VT associated with prolonged QT interval. The characteristic ECG appearance shows twisting of the QRS axis around the baseline. Common causes include electrolyte abnormalities (hypokalaemia, hypomagnesaemia) and QT-prolonging drugs.",
    points: ["Treatment: IV magnesium sulphate 2g even if Mg²⁺ normal", "Correct electrolytes; identify and remove offending drugs", "Consider isoproterenol or pacing to increase heart rate and shorten QT"]
  },
  {
    cat: "arrhythmia", catLabel: "Arrhythmia",
    q: "A 70-year-old man with ischaemic cardiomyopathy (EF 25%) has sustained monomorphic VT. He is haemodynamically stable. After cardioversion to sinus rhythm, which long-term therapy has the strongest mortality benefit?",
    opts: ["Amiodarone alone", "Implantable cardioverter-defibrillator (ICD)", "Flecainide", "Mexiletine"],
    ans: 1,
    explanation: "In patients with structural heart disease and sustained VT/VF, ICD implantation is the gold standard for secondary prevention of sudden cardiac death, with superior mortality benefit over antiarrhythmic drugs including amiodarone (AVID, CIDS, CASH trials).",
    points: ["Amiodarone can be used as adjunct to reduce ICD shocks", "Catheter ablation reduces VT burden but doesn't replace ICD", "Primary prevention ICD: EF ≤35% despite optimal therapy ≥3 months"]
  },
  {
    cat: "arrhythmia", catLabel: "Arrhythmia",
    q: "ECG shows regular sawtooth flutter waves at 300 bpm with 2:1 AV block, giving a ventricular rate of 150 bpm. What is the most appropriate initial pharmacological management?",
    opts: ["IV flecainide", "IV adenosine for rhythm control", "IV beta-blocker or diltiazem for rate control", "Oral digoxin loading"],
    ans: 2,
    explanation: "Atrial flutter at 300 bpm with 2:1 block typically gives a ventricular rate of 150 bpm. Rate control with IV beta-blockers or diltiazem is appropriate first-line. Cardioversion is used if haemodynamically unstable or for definitive rhythm control. Catheter ablation (cavotricuspid isthmus ablation) is curative.",
    points: ["Atrial flutter: atrial rate ≈ 300 bpm; ventricular rate depends on AV conduction ratio", "Anticoagulate as for AF if >48h duration or unknown onset", "CTI ablation has >90% success rate for typical flutter"]
  },
  {
    cat: "hf", catLabel: "Heart Failure",
    q: "A 65-year-old man with HFrEF (EF 28%) is on maximally tolerated ACEi and beta-blocker. What additional therapy provides both morbidity and mortality benefit?",
    opts: ["Amlodipine", "Spironolactone (MRA)", "Ivabradine", "Digoxin"],
    ans: 1,
    explanation: "Mineralocorticoid receptor antagonists (MRAs) such as spironolactone or eplerenone reduce mortality and hospitalisation in HFrEF when added to ACEi and beta-blocker (RALES, EMPHASIS-HF trials). Monitor for hyperkalaemia and renal impairment.",
    points: ["'Fantastic Four' in HFrEF: ACEi/ARNi, beta-blocker, MRA, SGLT2i", "Eplerenone preferred in males (less gynaecomastia)", "Contraindications: K⁺ >5.0 mmol/L, eGFR <30 ml/min/1.73m²"]
  },
  {
    cat: "hf", catLabel: "Heart Failure",
    q: "A patient with HFrEF (EF 22%) has LBBB and QRS duration of 155ms despite optimal medical therapy. Which device therapy is most appropriate?",
    opts: ["ICD only", "Cardiac resynchronisation therapy with defibrillator (CRT-D)", "Pacemaker for rate support", "No device therapy indicated"],
    ans: 1,
    explanation: "CRT-D is indicated in symptomatic HFrEF (NYHA II–IV) with EF ≤35%, LBBB, and QRS ≥150ms despite optimal medical therapy. CRT improves symptoms, exercise capacity, LV function and mortality. The defibrillator component also protects against sudden death.",
    points: ["Greatest benefit with LBBB morphology and QRS ≥150ms", "LBBB + QRS 130–149ms: may still benefit (consider CRT-D)", "Non-LBBB and QRS 120–149ms: less clear benefit"]
  },
  {
    cat: "hf", catLabel: "Heart Failure",
    q: "A 58-year-old woman is admitted with acute decompensated heart failure. BP is 90/60 mmHg and she is cool peripherally. Which haemodynamic profile does this represent?",
    opts: ["Warm and wet (volume overload)", "Cold and dry (cardiogenic shock with low filling)", "Cold and wet (cardiogenic shock)", "Warm and dry (euvolaemia, good output)"],
    ans: 2,
    explanation: "The 'cold and wet' profile reflects reduced cardiac output (cold/hypoperfused peripheries) with elevated filling pressures (pulmonary congestion/wet). This is the most severe presentation and may require inotropes, vasopressors, or mechanical circulatory support.",
    points: ["Cold and wet: low output + congestion → inotrope ± vasopressor ± MCS", "Warm and wet: euvolaemic output + congestion → diuresis", "Cold and dry: low output without congestion → cautious volume, inotrope"]
  },
  {
    cat: "hf", catLabel: "Heart Failure",
    q: "Which natriuretic peptide level at presentation is most consistent with acute decompensated heart failure as the cause of acute dyspnoea?",
    opts: ["BNP 40 pg/mL", "NT-proBNP 200 pg/mL", "BNP 800 pg/mL", "NT-proBNP 100 pg/mL"],
    ans: 2,
    explanation: "A BNP >100 pg/mL or NT-proBNP >300 pg/mL strongly supports acute HF. Values in the 'grey zone' (BNP 100–400) require clinical correlation. BNP >500 or NT-proBNP >900 (age-adjusted) are highly specific for acute decompensated HF.",
    points: ["BNP can be falsely low in obesity, flash pulmonary oedema", "NT-proBNP cut-offs are age-adjusted: >450 (<50y), >900 (50–75y), >1800 (>75y)", "BNP is reduced by sacubitril; interpret with caution in patients on ARNi"]
  },
  {
    cat: "hf", catLabel: "Heart Failure",
    q: "A 72-year-old woman with dyspnoea on exertion has preserved EF (60%) on echo with diastolic dysfunction and elevated LV filling pressures. What is the correct diagnosis?",
    opts: ["HFrEF", "HFmrEF", "HFpEF", "Restrictive cardiomyopathy (unclassified)"],
    ans: 2,
    explanation: "HFpEF (Heart Failure with preserved Ejection Fraction) is defined as symptoms/signs of HF with EF ≥50% and evidence of elevated LV filling pressures. It accounts for ~50% of HF cases and is strongly associated with hypertension, obesity, diabetes, and atrial fibrillation.",
    points: ["SGLT2 inhibitors (empagliflozin, dapagliflozin) shown to reduce HF hospitalisation in HFpEF", "Manage underlying risk factors: HTN, AF, obesity, diabetes", "No mortality benefit proven for ACEi/ARBs/beta-blockers in HFpEF"]
  },
  {
    cat: "cad", catLabel: "Coronary Artery Disease",
    q: "A 60-year-old man presents with 40 minutes of crushing central chest pain radiating to his left arm. ECG shows ST elevation in leads II, III, aVF. Which coronary artery is most likely occluded?",
    opts: ["Left anterior descending artery", "Left circumflex artery", "Right coronary artery", "Left main stem"],
    ans: 2,
    explanation: "Inferior STEMI (ST elevation in II, III, aVF) is most commonly caused by occlusion of the right coronary artery (RCA), which supplies the inferior wall in ~80% of patients (right-dominant circulation). Always check right-sided leads (V3R, V4R) for RV infarction.",
    points: ["RV infarct: ST elevation V4R, hypotension, clear lungs — avoid nitrates and diuretics", "Posterior extension: tall R and ST depression in V1–V2", "Door-to-balloon time target: <90 minutes for primary PCI"]
  },
  {
    cat: "cad", catLabel: "Coronary Artery Disease",
    q: "A patient presents with NSTEMI. Risk stratification using GRACE score shows high risk. What is the recommended management strategy?",
    opts: ["Fibrinolysis within 12 hours", "Invasive strategy (coronary angiography) within 24 hours", "Conservative medical management only", "Elective angiography in 4–6 weeks"],
    ans: 1,
    explanation: "High-risk NSTEMI/UA patients (GRACE score >140, elevated troponins, dynamic ECG changes) should undergo early invasive strategy with coronary angiography within 24 hours. Very high-risk features (refractory ischaemia, haemodynamic instability) warrant immediate (<2h) angiography.",
    points: ["Dual antiplatelet therapy: aspirin + P2Y12 inhibitor (ticagrelor or prasugrel preferred over clopidogrel)", "Anticoagulation: fondaparinux preferred in conservative strategy; UFH/enoxaparin for invasive", "GRACE score >140 = high risk; >200 = very high risk"]
  },
  {
    cat: "cad", catLabel: "Coronary Artery Disease",
    q: "A 55-year-old diabetic woman undergoes elective PCI with drug-eluting stent for stable angina. Dual antiplatelet therapy (DAPT) should be continued for a minimum of:",

const CATEGORIES = [
  { id: "all", label: "All Topics" },
  { id: "arrhythmia", label: "Arrhythmia" },
  { id: "hf", label: "Heart Failure" },
  { id: "cad", label: "Coronary Disease" },
  { id: "endo", label: "Endocarditis" },
  { id: "aorta", label: "Aortic Disease" },
  { id: "htn", label: "Hypertension" },
  { id: "valve", label: "Valvular" },
];

const CAT_STYLES = {
  arrhythmia: "cat-arrhythmia", hf: "cat-hf", cad: "cat-cad",
  endo: "cat-endo", aorta: "cat-aorta", htn: "cat-htn", valve: "cat-valve",
};

let filtered = [...cards];
let currentIdx = 0;
let isFlipped = false;
let answered = new Set();
let score = 0;

function buildFilters() {
  const row = document.getElementById("filterRow");
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (cat.id === "all" ? " active" : "");
    btn.textContent = cat.label;
    btn.dataset.cat = cat.id;
    btn.onclick = () => applyFilter(cat.id);
    row.appendChild(btn);
  });
}

function applyFilter(catId) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === catId));
  filtered = catId === "all" ? [...cards] : cards.filter(c => c.cat === catId);
  currentIdx = 0; isFlipped = false; answered.clear(); score = 0;
  document.getElementById("completedScreen").classList.remove("visible");
  document.getElementById("mainArea").style.display = "";
  renderCard(); updateProgress();
}

function renderCard() {
  const card = filtered[currentIdx];
  const front = document.getElementById("cardFront");
  const back = document.getElementById("cardBack");
  const alreadyAnswered = answered.has(currentIdx);

  front.classList.add("active");
  back.classList.remove("active");
  isFlipped = false;
  document.getElementById("flipBtn").textContent = "View Explanation";

  front.innerHTML = `
    <span class="category-tag ${CAT_STYLES[card.cat]}">${card.catLabel}</span>
    <div class="card-number">Question ${currentIdx + 1} of ${filtered.length}</div>
    <div class="question-text">${card.q}</div>
    <div class="options">
      ${card.opts.map((opt, i) => {
        let cls = "";
        if (alreadyAnswered) cls = (i === card.ans) ? "correct disabled" : "wrong disabled";
        return `<button class="option ${cls}" onclick="selectOption(${i})" ${alreadyAnswered ? "disabled" : ""}><span class="option-letter">${String.fromCharCode(65+i)}.</span>${opt}</button>`;
      }).join("")}
    </div>
    <div class="flip-hint">Select an answer, then click "View Explanation" to review</div>
  `;

  back.innerHTML = `
    <span class="category-tag ${CAT_STYLES[card.cat]}">${card.catLabel}</span>
    <div class="answer-section-label">Correct Answer</div>
    <div class="correct-answer-text">${String.fromCharCode(65+card.ans)}. ${card.opts[card.ans]}</div>
    <div class="explanation">${card.explanation}</div>
    <div class="key-points">
      ${card.points.map(p => `<div class="key-point">${p}</div>`).join("")}
    </div>
  `;
}

function selectOption(idx) {
  if (answered.has(currentIdx)) return;
  const card = filtered[currentIdx];
  answered.add(currentIdx);
  document.querySelectorAll(".option").forEach((opt, i) => {
    opt.disabled = true; opt.classList.add("disabled");
    if (i === card.ans) opt.classList.add("correct");
    else if (i === idx && idx !== card.ans) opt.classList.add("wrong");
  });
  if (idx === card.ans) score++;
  updateProgress();
}

function flipCard() {
  const front = document.getElementById("cardFront");
  const back = document.getElementById("cardBack");
  isFlipped = !isFlipped;
  if (isFlipped) {
    front.classList.remove("active"); back.classList.add("active");
    document.getElementById("flipBtn").textContent = "View Question";
  } else {
    back.classList.remove("active"); front.classList.add("active");
    document.getElementById("flipBtn").textContent = "View Explanation";
  }
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= filtered.length) return;
  currentIdx = newIdx;
  renderCard(); updateProgress();
  if (currentIdx === filtered.length - 1 && answered.size === filtered.length) showCompleted();
}

function updateProgress() {
  const pct = Math.max(2, ((currentIdx + 1) / filtered.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${currentIdx + 1} / ${filtered.length}`;
  document.getElementById("scoreBadge").textContent = `Score: ${score}`;
  document.getElementById("prevBtn").disabled = currentIdx === 0;
  document.getElementById("nextBtn").disabled = currentIdx === filtered.length - 1;
}

function showCompleted() {
  setTimeout(() => {
    document.getElementById("mainArea").style.display = "none";
    document.getElementById("completedScreen").classList.add("visible");
    document.getElementById("finalScoreNum").textContent = `${score} / ${filtered.length}`;
  }, 200);
}

function restart() {
  currentIdx = 0; isFlipped = false; answered.clear(); score = 0;
  document.getElementById("completedScreen").classList.remove("visible");
  document.getElementById("mainArea").style.display = "";
  renderCard(); updateProgress();
}

buildFilters(); renderCard(); updateProgress();
</script>
</body>
